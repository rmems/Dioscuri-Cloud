name: terraform-validate

on:
  pull_request:
    paths:
      - "terraform/**"
      - "infra/terraform/**"
      - ".github/workflows/terraform-validate.yml"
  push:
    branches:
      - main
    paths:
      - "terraform/**"
      - "infra/terraform/**"
      - ".github/workflows/terraform-validate.yml"

permissions:
  contents: read

jobs:
  fmt:
    name: Terraform fmt (check)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: "1.10.5"
          terraform_wrapper: false

      - name: terraform fmt -check -recursive
        run: |
          terraform fmt -check -recursive terraform
          terraform fmt -check -recursive infra/terraform

  validate:
    name: Terraform validate (safe subset)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: "1.10.5"
          terraform_wrapper: false

      - name: Validate modules (no providers required)
        shell: bash
        run: |
          set -euo pipefail

          validated=0
          # Module skeletons should validate without provider plugins.
          for d in terraform/modules/*; do
            if [ -d "$d" ]; then
              echo "Validating module: $d"
              terraform -chdir="$d" init -backend=false
              terraform -chdir="$d" validate
              validated=$((validated + 1))
            fi
          done

          if [ "$validated" -eq 0 ]; then
            echo "ERROR: No Terraform modules found under terraform/modules/" >&2
            exit 1
          fi

          validated_infra=0
          for d in infra/terraform/modules/*; do
            if [ -d "$d" ]; then
              echo "Validating infra module: $d"
              terraform -chdir="$d" init -backend=false
              terraform -chdir="$d" validate
              validated_infra=$((validated_infra + 1))
            fi
          done

          if [ "$validated_infra" -eq 0 ]; then
            echo "ERROR: No Terraform modules found under infra/terraform/modules/" >&2
            exit 1
          fi

      - name: Validate infra onboarding environment
        run: |
          terraform -chdir=infra/terraform/environments/dev init -backend=false
          terraform -chdir=infra/terraform/environments/dev validate

      - name: Validate Vultr scaffold environment
        run: |
          terraform -chdir=infra/terraform/environments/vultr-dev init -backend=false
          terraform -chdir=infra/terraform/environments/vultr-dev validate

      - name: Validate oracle-dev scaffold environment
        run: |
          terraform -chdir=terraform/envs/oracle-dev init -backend=false
          terraform -chdir=terraform/envs/oracle-dev validate

      - name: Env validation skipped (ibm-dev provider wiring deferred)
        run: |
          echo "terraform/envs/ibm-dev validation skipped until IBM provider block is added."
          echo "terraform/envs/oracle-dev is validated above; ibm-dev can be added similarly when ready."
